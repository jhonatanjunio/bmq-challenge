version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: payment-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: payment_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: payment-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/payment_db
      PORT: 3000
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: payment-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

  # Serviço auxiliar para abrir o browser (apenas informativo no README)
  # Em ambiente local real, o usuário rodaria um script shell
